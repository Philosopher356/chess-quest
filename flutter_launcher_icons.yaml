flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"

  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#F8F6FF"
    theme_color: "#6C63FF"

  # Android adaptive icon
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_background: "#F8F6FF"

  # Remove alpha channel for iOS (required by App Store)
  remove_alpha_ios: true

  # Minimum SDK for Android
  min_sdk_android: 21
